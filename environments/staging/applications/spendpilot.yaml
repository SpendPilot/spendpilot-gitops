apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: spendpilot-staging
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/SpendPilot/spendpilot-helm.git
      targetRevision: main
      path: charts/spendpilot
      helm:
        valueFiles:
          - $values/environments/staging/values/spendpilot-values.yaml
    - repoURL: https://github.com/SpendPilot/spendpilot-gitops.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: spend-control
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
